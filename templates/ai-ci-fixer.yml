name: AI CI Fixer

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Failed workflow run id to fix'
        required: true
      base_ref:
        description: 'Base branch'
        required: false
        default: main
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  ai-fix:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'failure'
    uses: __AI_FIXER_REPO__/.github/workflows/reusable-ai-ci-fixer.yml@__AI_FIXER_REF__
    with:
      owner: ${{ github.repository_owner }}
      repo: ${{ github.event.repository.name }}
      run_id: ${{ github.event_name == 'workflow_dispatch' && inputs.run_id || github.event.workflow_run.id }}
      base_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.base_ref || github.event.workflow_run.head_branch || 'main' }}
      ai_fixer_ref: __AI_FIXER_REF__
    secrets: inherit
